version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-meetmit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meetmit_dev_only}
      POSTGRES_DB: ${DB_NAME:-meetmit}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pgdata:
